spring:
  application:
    name: e-commerce-website

  security:
    user:
      name: admin
      password: admin123

  datasource:
    url: jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

logging:
  level:
    org.example: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG